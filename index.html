<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Surf Style Test</title>

<style>

body{
font-family: Pretendard, sans-serif;
background: linear-gradient(180deg,#6ec7ff,#bfe9ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:10px;
background:#2f80ed;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1366d6;
}

img{
width:200px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container" id="app">

<h1>🌊 Surf Style Test</h1>
<p>언어를 선택하세요 / Choose Language</p>

<button onclick="startTest('ko')">한국어</button>
<button onclick="startTest('en')">English</button>

</div>

<script>

let lang="ko"
let q=0
let scoreA=0
let scoreB=0

const data={

ko:{
questions:[
"여행 가면 계획부터 세운다",
"새로운 스포츠 보면 바로 도전한다",
"사람 많은 곳이 좋다",
"바다를 보면 바로 들어가고 싶다",
"친구들과 노는 게 좋다",
"혼자 여행도 좋아한다",
"도전적인 활동이 좋다",
"사진 찍는 걸 좋아한다"
],

results:{
wave:{
title:"🌊 파도 헌터",
desc:"도전과 스릴을 즐기는 타입. 서핑 실력 향상을 위해 끊임없이 파도를 찾는다.",
img:"wave.png"
},

free:{
title:"🏄 자유 서퍼",
desc:"계획보다 자유. 새로운 해변과 파도를 탐험하는 여행자 스타일.",
img:"free.png"
},

vibe:{
title:"🌴 비치 바이브 메이커",
desc:"사람들과 함께하는 해변 라이프를 즐기는 분위기 메이커.",
img:"vibe.png"
},

soul:{
title:"🌅 오션 소울",
desc:"바다 자체를 사랑하는 감성형. 서핑은 명상 같은 시간.",
img:"soul.png"
}
}
},

en:{
questions:[
"I like planning before traveling",
"I try new sports quickly",
"I enjoy crowded places",
"The ocean makes me want to jump in",
"I enjoy hanging with friends",
"I like traveling alone",
"I like challenging activities",
"I enjoy taking photos"
],

results:{
wave:{
title:"🌊 Wave Hunter",
desc:"Thrill seeker who constantly looks for bigger waves.",
img:"wave.png"
},

free:{
title:"🏄 Free Surfer",
desc:"Freedom first. Loves exploring new beaches and waves.",
img:"free.png"
},

vibe:{
title:"🌴 Beach Vibe Maker",
desc:"Social energy of the beach. Brings the fun everywhere.",
img:"vibe.png"
},

soul:{
title:"🌅 Ocean Soul",
desc:"Feels deeply connected to the ocean. Surfing is meditation.",
img:"soul.png"
}
}

}

}

function startTest(l){

lang=l
showQuestion()

}

function showQuestion(){

const question=data[lang].questions[q]

document.getElementById("app").innerHTML=`

<h2>${question}</h2>

<button onclick="answer('A')">👍</button>
<button onclick="answer('B')">👎</button>

<p>${q+1}/8</p>

`

}

function answer(type){

if(type==="A")scoreA++
else scoreB++

q++

if(q<8) showQuestion()
else showResult()

}

function showResult(){

let result

if(scoreA>=6) result="wave"
else if(scoreA>=4) result="free"
else if(scoreA>=2) result="vibe"
else result="soul"

const r=data[lang].results[result]

document.getElementById("app").innerHTML=`

<h2>${r.title}</h2>

<img src="${r.img}">

<p>${r.desc}</p>

<br>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSdUfT1mArajdegkuPpvFVDfW-E7uEoijNLzhviAQCk5fOchiw/viewform">

<button>동아리 신청하기</button>

</a>

`

}

</script>

</body>
</html>
